name: Facebook Poster

on:
  schedule:
    - cron: '0 8 * * *'      # раз в день в 8:00 UTC (11:00 МСК)
  workflow_dispatch:          # ручной запуск

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proxy-auto-checker (keys + cover)
        uses: actions/checkout@v4
        with:
          repository: kort0881/proxy-auto-checker
          path: proxy-auto-checker

      - name: Checkout facebook poster
        uses: actions/checkout@v4
        with:
          repository: kort0881/facebook-group-poster
          path: facebook-group-poster

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r facebook-group-poster/requirements.txt
          # Для совместимости: устанавливаем andi-совместимую версию chromedriver
          pip install undetected-chromedriver==3.5.5

      - name: Setup Chrome (full install)
        run: |
          # Chrome уже предустановлен на ubuntu-latest, но ChromeDriver отстаёт.
          # Устанавливаем через google-chrome и chromedriver из undetected
          google-chrome --version || true
          # Удаляем старый chromedriver если есть
          sudo apt-get remove -y chromedriver 2>/dev/null || true

      - name: Copy assets from proxy-auto-checker
        run: |
          cp -r proxy-auto-checker/results facebook-group-poster/ 2>/dev/null || echo "⚠️ results/ не существует"
          cp -r proxy-auto-checker/checked facebook-group-poster/ 2>/dev/null || echo "⚠️ checked/ не существует"
          cp proxy-auto-checker/cover_public.jpg facebook-group-poster/ 2>/dev/null || echo "⚠️ cover_public.jpg не найден в proxy-auto-checker"
          echo "📂 Состав facebook-group-poster:"
          ls -la facebook-group-poster/

      - name: Run Facebook poster
        env:
          FACEBOOK_COOKIES_B64: ${{ secrets.FACEBOOK_COOKIES_B64 }}
        run: |
          cd facebook-group-poster
          python post_to_facebook.py

      - name: Upload debug artifacts (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fb-debug
          path: |
            fb_*.png
            fb_*.html
          if-no-files-found: ignore
